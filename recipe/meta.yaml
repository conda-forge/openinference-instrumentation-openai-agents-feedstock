{% set name = "openinference-instrumentation-openai-agents" %}
{% set version = "1.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/openinference_instrumentation_openai_agents-{{ version }}.tar.gz
  sha256: 80e544c5b8ed16f77666ea3ca8c77e6c0bddde650f9842871f2d1e427e550928

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python  {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }},<3.14
    - opentelemetry-api
    - opentelemetry-instrumentation
    - opentelemetry-semantic-conventions
    - openinference-instrumentation >=0.1.27
    - openinference-semantic-conventions >=0.1.21
    - typing_extensions
    - wrapt
  run_constrained:
    - openai-agents >=0.2.6

test:
  imports:
    - openinference.instrumentation.openai_agents
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/Arize-ai/openinference/tree/main/python/instrumentation/openinference-instrumentation-openai-agents
  summary: OpenInference OpenAI Agents Instrumentation
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - visze
